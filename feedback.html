<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feedback — Transcribr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0f0f8; --muted: #888899; --accent: #7c6aff; --accent2: #a78bfa; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.92); backdrop-filter: blur(16px); }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent2); }
.page { max-width: 560px; margin: 5rem auto; padding: 0 2rem 4rem; }
.page h1 { font-size: 2rem; margin-bottom: 0.4rem; }
.page .sub { color: var(--muted); margin-bottom: 2.5rem; font-size: 0.92rem; line-height: 1.6; }
label { display: block; color: var(--muted); font-size: 0.82rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; margin-top: 1.3rem; }
input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 10px; padding: 0.72rem 1rem; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 130px; }
.stars { display: flex; gap: 0.5rem; margin-top: 0.3rem; }
.star { font-size: 1.6rem; cursor: pointer; opacity: 0.35; transition: opacity 0.15s; }
.star.active, .star:hover { opacity: 1; }
.btn { margin-top: 1.6rem; width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 100px; font-size: 0.92rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s; }
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.success { display: none; text-align: center; padding: 2rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 14px; margin-top: 2rem; }
.success .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
.success h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }
.success p { color: var(--muted); font-size: 0.88rem; }
footer { border-top: 1px solid var(--border); padding: 2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; color: var(--muted); font-size: 0.83rem; }
footer a { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Transcribr<span>.</span></a>
  <a href="/dashboard.html" style="color:var(--muted);font-size:0.88rem;text-decoration:none;">← Dashboard</a>
</nav>
<div class="page">
  <h1>Share Feedback</h1>
  <p class="sub">We read every message. Tell us what's working, what isn't, or what you'd love to see next.</p>

  <div id="formWrap">
    <label>Your experience</label>
    <div class="stars" id="stars">
      <span class="star" data-v="1">⭐</span>
      <span class="star" data-v="2">⭐</span>
      <span class="star" data-v="3">⭐</span>
      <span class="star" data-v="4">⭐</span>
      <span class="star" data-v="5">⭐</span>
    </div>

    <label>Category</label>
    <select id="cat">
      <option value="general">General feedback</option>
      <option value="accuracy">Transcription accuracy</option>
      <option value="speed">Speed / performance</option>
      <option value="ux">UI / user experience</option>
      <option value="feature">Feature request</option>
      <option value="other">Other</option>
    </select>

    <label>Your message</label>
    <textarea id="msg" placeholder="Tell us what you think…"></textarea>

    <label>Email (optional)</label>
    <input type="email" id="email" placeholder="you@example.com"/>

    <button class="btn" id="submitBtn" onclick="submitFeedback()">Send Feedback →</button>
  </div>

  <div class="success" id="successBox">
    <div class="icon">🎉</div>
    <h3>Thank you!</h3>
    <p>Your feedback has been received. We'll review it and use it to improve Transcribr.</p>
  </div>
</div>

<footer>
  <span>© 2025 Transcribr</span>
  <div style="display:flex;gap:1.5rem">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="/contact.html">Contact</a>
  </div>
</footer>

<script>
let rating = 0;
const stars = document.querySelectorAll('.star');
stars.forEach(s => {
  s.addEventListener('click', () => {
    rating = parseInt(s.dataset.v);
    stars.forEach((st, i) => st.classList.toggle('active', i < rating));
  });
});

function submitFeedback() {
  const msg = document.getElementById('msg').value.trim();
  if (!msg) { alert('Please enter a message.'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Sending…';
  // Simulate send (replace with real endpoint if desired)
  setTimeout(() => {
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  }, 800);
}
</script>
</body>
</html>
