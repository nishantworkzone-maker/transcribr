<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Transcribr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f0f0f8; --muted: #888899; --accent: #7c6aff; --accent2: #a78bfa;
  --green: #34d399; --red: #f87171;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
h1,h2,h3 { font-family: 'Syne', sans-serif; }

nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; border-bottom: 1px solid var(--border); }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent2); }

.auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
.auth-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; text-align: center; }
.auth-sub { color: var(--muted); font-size: 0.88rem; text-align: center; margin-bottom: 2rem; }

.tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 1.8rem; }
.tab { flex: 1; padding: 0.5rem; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: var(--muted); transition: all 0.2s; border: none; background: transparent; font-family: 'DM Sans', sans-serif; }
.tab.active { background: var(--accent); color: #fff; }

.google-btn { width: 100%; padding: 0.75rem; background: #fff; color: #1a1a1a; border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; margin-bottom: 1.2rem; }
.google-btn:hover { opacity: 0.92; }
.google-icon { width: 18px; height: 18px; }

.divider { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; color: var(--muted); font-size: 0.8rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
.form-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 10px; padding: 0.7rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; transition: border-color 0.2s; }
.form-group input:focus { outline: none; border-color: var(--accent); }

.submit-btn { width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; transition: opacity 0.2s; margin-top: 0.5rem; }
.submit-btn:hover { opacity: 0.88; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
.success-msg { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }

.switch-text { text-align: center; font-size: 0.85rem; color: var(--muted); margin-top: 1.2rem; }
.switch-text a { color: var(--accent2); cursor: pointer; text-decoration: none; }

.back-link { text-align: center; margin-top: 1rem; }
.back-link a { color: var(--muted); font-size: 0.83rem; text-decoration: none; }
.back-link a:hover { color: var(--text); }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Transcribr<span>.</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to access your transcripts</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Google Login -->
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="signIn()">Sign In</button>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Nishant Kumar"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 8 characters"/>
      </div>
      <button class="submit-btn" id="signupBtn" onclick="signUp()">Create Account</button>
    </div>

    <div class="switch-text" id="switchText">
      Don't have an account? <a onclick="switchTab('signup')">Sign up free</a>
    </div>

    <div class="back-link">
      <a href="/">← Back to Transcribr</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = document.currentScript?.dataset?.url || '';
const SUPABASE_ANON_KEY = document.currentScript?.dataset?.key || '';

// Initialize Supabase from meta tags
const supabaseUrl = document.querySelector('meta[name="supabase-url"]')?.content || '';
const supabaseKey = document.querySelector('meta[name="supabase-key"]')?.content || '';

async function initSupabase() {
  const res = await fetch('/api/config');
  const cfg = await res.json();
  return window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
}

let sb;
initSupabase().then(client => {
  sb = client;
  // Check if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/dashboard.html';
  });
  // Handle OAuth redirect
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = '/dashboard.html';
    }
  });
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
  document.querySelector('.auth-title').textContent = tab==='login'?'Welcome back':'Create account';
  document.querySelector('.auth-sub').textContent = tab==='login'?'Sign in to access your transcripts':'Start transcribing for free';
  document.getElementById('switchText').innerHTML = tab==='login'
    ? 'Don\'t have an account? <a onclick="switchTab(\'signup\')">Sign up free</a>'
    : 'Already have an account? <a onclick="switchTab(\'login\')">Sign in</a>';
  clearMessages();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}
function clearMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

async function signInWithGoogle() {
  if (!sb) return;
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showError(error.message);
}

async function signIn() {
  if (!sb) return;
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('Please fill in all fields'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showError(error.message); btn.disabled=false; btn.textContent='Sign In'; }
  else window.location.href = '/dashboard.html';
}

async function signUp() {
  if (!sb) return;
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!name||!email||!password) { showError('Please fill in all fields'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters'); return; }
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  if (error) { showError(error.message); btn.disabled=false; btn.textContent='Create Account'; }
  else showSuccess('Account created! Please check your email to verify.');
}
</script>
</body>
</html>
