<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transcript — Transcribr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #f0f0f8; --muted: #777888; --accent: #7c6aff; --accent2: #a78bfa;
  --green: #34d399; --red: #f87171; --yellow: #fbbf24;
  --glow: rgba(124,106,255,0.15);
  --nav-h: 52px; --file-h: 68px; --audio-h: 70px;
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

/* NAV */
nav {
  height: var(--nav-h); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.8rem; border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.98); z-index: 200;
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent2); }
.nav-actions { display: flex; align-items: center; gap: 0.6rem; }
.btn { display: inline-flex; align-items: center; gap: 5px; border-radius: 8px; font-size: 0.78rem; padding: 0.35rem 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); white-space: nowrap; }
.btn:hover { color: var(--text); border-color: var(--accent); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.back-link { color: var(--muted); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
.back-link:hover { color: var(--text); }

/* FILE BAR */
.file-bar {
  flex-shrink: 0; height: var(--file-h);
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 2rem; display: flex; align-items: center; gap: 2rem;
}
.file-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 500px; }
.file-meta { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); font-size: 0.71rem; padding: 2px 8px; border-radius: 100px; }
.chip.purple { color: var(--accent2); border-color: rgba(124,106,255,0.3); background: var(--glow); }
.chip.green { color: var(--green); border-color: rgba(52,211,153,0.25); background: rgba(52,211,153,0.08); }

/* CONTENT AREA */
.content-area { flex: 1; display: flex; min-height: 0; overflow: hidden; }

/* LEFT TRANSCRIPT PANEL */
.transcript-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; overflow: hidden; }
.panel-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 1.3rem; border-bottom: 1px solid var(--border); background: var(--surface); }
.panel-title { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.word-badge { font-size: 0.7rem; color: var(--muted); }
.search-bar { flex-shrink: 0; padding: 0.55rem 1rem; border-bottom: 1px solid var(--border); background: var(--bg); }
.search-inner { position: relative; }
.search-input { width: 100%; background: var(--surface); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 0.42rem 2.2rem 0.42rem 1.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; transition: border-color 0.2s; }
.search-input:focus { outline: none; border-color: var(--accent); }
.si { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); font-size: 0.78rem; color: var(--muted); pointer-events: none; }
.match-ct { position: absolute; right: 0.7rem; top: 50%; transform: translateY(-50%); font-size: 0.68rem; color: var(--muted); }
.transcript-scroll { flex: 1; overflow-y: auto; padding: 0.7rem 0.9rem; min-height: 0; }
.transcript-scroll::-webkit-scrollbar { width: 3px; }
.transcript-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Lines */
.t-line { display: flex; gap: 0.65rem; padding: 0.42rem 0.45rem; border-radius: 7px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; margin-bottom: 1px; }
.t-line:hover { background: rgba(255,255,255,0.03); }
.t-line.active { background: rgba(124,106,255,0.11); border-left-color: var(--accent); }
.t-ts { font-size: 0.67rem; color: var(--accent2); font-weight: 600; white-space: nowrap; padding-top: 3px; min-width: 32px; font-variant-numeric: tabular-nums; flex-shrink: 0; opacity: 0.7; transition: opacity 0.15s; }
.t-body { flex: 1; }
.t-spk { font-size: 0.68rem; font-weight: 700; margin-bottom: 2px; }
.t-txt { font-size: 0.87rem; line-height: 1.7; color: var(--text); }
.t-line.active .t-txt { color: #fff; }
.t-line.active .t-ts { opacity: 1; }
.spk-0 { color: var(--green); }
.spk-1 { color: var(--accent2); }
.spk-2 { color: var(--yellow); }
.spk-3 { color: #f472b6; }
.spk-4 { color: #38bdf8; }
.plain-text { white-space: pre-wrap; word-break: break-word; font-size: 0.87rem; line-height: 1.9; color: var(--text); padding: 0.3rem 0.4rem; }
mark.hl { background: rgba(124,106,255,0.32); color: var(--text); border-radius: 2px; padding: 0 1px; }

/* PII badge */
.pii-tag { display: inline-flex; align-items: center; gap: 2px; background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.4); color: #fca5a5; font-size: 0.66rem; font-weight: 700; padding: 0 5px; border-radius: 4px; margin: 0 1px; vertical-align: middle; letter-spacing: 0.3px; }

/* RIGHT INSIGHTS PANEL */
.insights-panel { width: 270px; flex-shrink: 0; overflow-y: auto; background: var(--surface); padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; min-height: 0; }
.insights-panel::-webkit-scrollbar { width: 3px; }
.insights-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.ins-section { }
.ins-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 0.5rem; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
.stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 0.65rem; }
.stat-box-label { font-size: 0.61rem; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-box-val { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }
.stat-box-val.small { font-size: 0.83rem; font-family: 'DM Sans', sans-serif; font-weight: 500; padding-top: 2px; color: var(--text); }
.spk-list { display: flex; flex-direction: column; gap: 0.45rem; }
.spk-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.spk-name { font-size: 0.75rem; font-weight: 600; }
.spk-pct { font-size: 0.68rem; color: var(--muted); }
.spk-bar-wrap { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.spk-bar-fill { height: 100%; border-radius: 2px; }
.engine-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem; display: flex; align-items: center; gap: 0.6rem; }
.engine-icon { font-size: 1.35rem; }
.engine-name { font-size: 0.82rem; font-weight: 600; }
.engine-sub { font-size: 0.68rem; color: var(--muted); }
.export-list { display: flex; flex-direction: column; gap: 0.35rem; }
.exp-btn { display: flex; align-items: center; gap: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.42rem 0.72rem; border-radius: 7px; font-size: 0.77rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s; width: 100%; }
.exp-btn:hover { border-color: var(--accent); color: var(--accent2); }
.exp-btn.cp { background: var(--accent); border-color: var(--accent); color: #fff; }
.exp-btn.cp:hover { opacity: 0.88; }

/* TRANSLATE SECTION */
.translate-select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 0.45rem 0.7rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; margin-bottom: 0.45rem; appearance: none; cursor: pointer; }
.translate-select:focus { outline: none; border-color: var(--accent); }
.translate-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--surface2); border: 1px solid var(--accent); color: var(--accent2); padding: 0.45rem; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s; }
.translate-btn:hover { background: var(--glow); }
.translate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* TRANSLATE OVERLAY */
.translate-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; backdrop-filter: blur(4px); }
.translate-overlay.show { display: flex; align-items: center; justify-content: center; }
.translate-modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 90%; max-width: 700px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
.translate-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.4rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.translate-modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
.translate-modal-close { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
.translate-modal-body { flex: 1; overflow-y: auto; padding: 1.2rem 1.4rem; }
.translate-modal-body::-webkit-scrollbar { width: 3px; }
.translate-modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.translate-content { font-size: 0.9rem; line-height: 1.85; color: var(--text); white-space: pre-wrap; }
.translate-loading { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 3rem; color: var(--muted); font-size: 0.88rem; }
.translate-spinner { width: 28px; height: 28px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
.translate-modal-footer { padding: 0.8rem 1.4rem; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 0.5rem; }
.translate-dl-btn { flex: 1; padding: 0.5rem; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); transition: all 0.18s; }
.translate-dl-btn:hover { border-color: var(--accent); color: var(--accent2); }

/* AUDIO BAR */
.audio-bar {
  flex-shrink: 0; height: var(--audio-h);
  background: rgba(13,13,20,0.98); border-top: 1px solid var(--border2);
  padding: 0 1.6rem; display: flex; align-items: center; gap: 0.9rem; z-index: 300;
}
/* No-audio hint (shown when no URL saved) */
.no-audio-msg { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
.play-btn:hover:not(:disabled) { transform: scale(1.08); }
.play-btn:disabled { opacity: 0.35; cursor: default; }
.now-playing-label { font-size: 0.72rem; color: var(--accent2); flex-shrink: 0; white-space: nowrap; }
.seek-area { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.seek-track { position: relative; height: 18px; cursor: pointer; display: flex; align-items: center; }
.seek-track-inner { position: relative; height: 4px; background: var(--border2); border-radius: 2px; width: 100%; overflow: hidden; }
.seek-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; }
.seek-thumb { position: absolute; top: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%; border: 2px solid var(--accent); transform: translate(-50%,-50%); left: 0%; pointer-events: none; box-shadow: 0 0 0 3px rgba(124,106,255,0.2); transition: left 0.06s linear; }
.seek-times { display: flex; justify-content: space-between; font-size: 0.66rem; color: var(--muted); font-variant-numeric: tabular-nums; }
.audio-right { display: flex; align-items: center; gap: 0.65rem; flex-shrink: 0; }
.speed-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); padding: 0.22rem 0.5rem; border-radius: 5px; font-size: 0.7rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s; }
.speed-btn:hover, .speed-btn.active { border-color: var(--accent); color: var(--accent2); }
.follow-toggle { display: flex; align-items: center; gap: 5px; font-size: 0.71rem; color: var(--muted); cursor: pointer; white-space: nowrap; }
.toggle-pill { position: relative; width: 30px; height: 17px; flex-shrink: 0; }
.toggle-pill input { opacity: 0; width: 0; height: 0; position: absolute; }
.pill-track { position: absolute; inset: 0; background: var(--border2); border-radius: 17px; transition: background 0.2s; cursor: pointer; }
.pill-track::after { content: ''; position: absolute; width: 11px; height: 11px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
input:checked + .pill-track { background: var(--accent); }
input:checked + .pill-track::after { transform: translateX(13px); }
.vol-grp { display: flex; align-items: center; gap: 4px; }
.vol-icon { font-size: 0.82rem; cursor: pointer; user-select: none; }
.vol-range { width: 50px; accent-color: var(--accent); cursor: pointer; }

/* LOADING */
.loading-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 1rem; }
.spinner { width: 26px; height: 26px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 0.5rem 1.1rem; border-radius: 100px; font-size: 0.8rem; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 720px) { .insights-panel { display: none; } .audio-right { display: none; } }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Transcribr<span>.</span></a>
  <div class="nav-actions">
    <a href="/dashboard.html" class="back-link">← Dashboard</a>
    <button class="btn danger" onclick="deleteTranscript()">🗑 Delete</button>
  </div>
</nav>

<div class="file-bar" id="fileBar" style="display:none">
  <div>
    <div class="file-name" id="fileName">—</div>
    <div class="file-meta" style="margin-top:4px">
      <span class="chip" id="chipDate">—</span>
      <span class="chip purple" id="chipMode">—</span>
      <span class="chip" id="chipLang">—</span>
      <span class="chip green" id="chipWords">—</span>
    </div>
  </div>
</div>

<div class="loading-state" id="loadingState">
  <div class="spinner"></div>
  <span>Loading transcript…</span>
</div>

<div class="content-area" id="contentArea" style="display:none">

  <!-- LEFT: TRANSCRIPT -->
  <div class="transcript-panel">
    <div class="panel-header">
      <span class="panel-title">Transcript</span>
      <span class="word-badge" id="wordBadge">0 words</span>
    </div>
    <div class="search-bar">
      <div class="search-inner">
        <span class="si">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search in transcript…" oninput="doSearch(this.value)"/>
        <span class="match-ct" id="matchCt"></span>
      </div>
    </div>
    <div class="transcript-scroll" id="transcriptScroll">
      <div id="transcriptLines"></div>
    </div>
  </div>

  <!-- RIGHT: INSIGHTS -->
  <div class="insights-panel">
    <div class="ins-section">
      <div class="ins-label">Overview</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-box-label">Words</div><div class="stat-box-val" id="insWords">0</div></div>
        <div class="stat-box"><div class="stat-box-label">Lines</div><div class="stat-box-val" id="insLines">0</div></div>
        <div class="stat-box"><div class="stat-box-label">Characters</div><div class="stat-box-val" id="insChars">0</div></div>
        <div class="stat-box"><div class="stat-box-label">Speakers</div><div class="stat-box-val" id="insSpeakers">—</div></div>
      </div>
    </div>
    <div class="ins-section" id="spkSection" style="display:none">
      <div class="ins-label">Speakers</div>
      <div class="spk-list" id="spkList"></div>
    </div>
    <div class="ins-section">
      <div class="ins-label">Engine</div>
      <div class="engine-box">
        <div class="engine-icon" id="engineIcon">⚡</div>
        <div><div class="engine-name" id="engineName">—</div><div class="engine-sub" id="engineSub">—</div></div>
      </div>
    </div>
    <div class="ins-section">
      <div class="ins-label">Created</div>
      <div class="stat-box"><div class="stat-box-val small" id="insDate">—</div></div>
    </div>
    <div class="ins-section">
      <div class="ins-label">Language</div>
      <div class="stat-box"><div class="stat-box-val small" id="insLang">—</div></div>
    </div>

    <!-- TRANSLATE -->
    <div class="ins-section">
      <div class="ins-label">🌐 Translate</div>
      <select class="translate-select" id="translateLang">
        <option value="">Select language…</option>
        <option value="Hindi">Hindi</option>
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Arabic">Arabic</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Japanese">Japanese</option>
        <option value="Chinese (Simplified)">Chinese</option>
        <option value="Korean">Korean</option>
        <option value="Italian">Italian</option>
        <option value="Russian">Russian</option>
        <option value="Dutch">Dutch</option>
        <option value="Polish">Polish</option>
        <option value="Turkish">Turkish</option>
        <option value="Vietnamese">Vietnamese</option>
        <option value="Thai">Thai</option>
        <option value="Indonesian">Indonesian</option>
        <option value="Bengali">Bengali</option>
        <option value="Urdu">Urdu</option>
        <option value="Punjabi">Punjabi</option>
        <option value="Marathi">Marathi</option>
        <option value="Tamil">Tamil</option>
        <option value="Telugu">Telugu</option>
      </select>
      <button class="translate-btn" id="translateBtn" onclick="startTranslation()">
        🌐 Translate Transcript
      </button>
    </div>

    <!-- EXPORT -->
    <div class="ins-section">
      <div class="ins-label">Export</div>
      <div class="export-list">
        <button class="exp-btn cp" onclick="copyText()"><span>📋</span> Copy to clipboard</button>
        <button class="exp-btn" onclick="downloadTxt()"><span>📄</span> Download TXT</button>
        <button class="exp-btn" onclick="downloadSrt()"><span>🎬</span> Download SRT</button>
        <button class="exp-btn" onclick="downloadVtt()"><span>💬</span> Download VTT</button>
      </div>
    </div>
  </div>

</div>

<!-- AUDIO BAR — auto-loads from saved URL, no upload button -->
<div class="audio-bar">
  <!-- Shown only when no audio_url was saved -->
  <div class="no-audio-msg" id="noAudioMsg" style="display:none">
    🎵 No audio — file transcriptions can't be replayed
  </div>
  <!-- Shown when URL audio is loaded -->
  <span class="now-playing-label" id="nowPlayingLabel" style="display:none">🔗 URL audio</span>

  <button class="play-btn" id="playBtn" onclick="togglePlay()" disabled>▶</button>

  <div class="seek-area">
    <div class="seek-track" id="seekTrack" onclick="seekClick(event)">
      <div class="seek-track-inner">
        <div class="seek-fill" id="seekFill"></div>
        <div class="seek-thumb" id="seekThumb"></div>
      </div>
    </div>
    <div class="seek-times">
      <span id="curTime">0:00</span>
      <span id="durTime">0:00</span>
    </div>
  </div>

  <div class="audio-right">
    <div style="display:flex;gap:3px">
      <button class="speed-btn" onclick="setSpeed(0.75,this)">0.75×</button>
      <button class="speed-btn active" onclick="setSpeed(1,this)">1×</button>
      <button class="speed-btn" onclick="setSpeed(1.25,this)">1.25×</button>
      <button class="speed-btn" onclick="setSpeed(1.5,this)">1.5×</button>
    </div>
    <label class="follow-toggle">
      <span class="toggle-pill">
        <input type="checkbox" id="followTgl" checked/>
        <span class="pill-track"></span>
      </span>
      Follow
    </label>
    <div class="vol-grp">
      <span class="vol-icon" onclick="toggleMute()">🔊</span>
      <input type="range" class="vol-range" min="0" max="1" step="0.05" value="1" oninput="audio.volume=this.value"/>
    </div>
  </div>
</div>

<!-- TRANSLATE MODAL -->
<div class="translate-overlay" id="translateOverlay">
  <div class="translate-modal">
    <div class="translate-modal-header">
      <div class="translate-modal-title" id="translateModalTitle">Translation</div>
      <button class="translate-modal-close" onclick="closeTranslation()">✕</button>
    </div>
    <div class="translate-modal-body" id="translateModalBody">
      <div class="translate-loading">
        <div class="translate-spinner"></div>
        <span>Translating…</span>
      </div>
    </div>
    <div class="translate-modal-footer">
      <button class="translate-dl-btn" onclick="copyTranslation()">📋 Copy</button>
      <button class="translate-dl-btn" onclick="downloadTranslation()">⬇ Download TXT</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audioEl" preload="metadata"></audio>

<script>
let sb, T = null, lines = [], activeIdx = -1, audioLoaded = false;
let translatedText = '', translateLangName = '';
const audio = document.getElementById('audioEl');
const SPEAKER_COLORS = ['spk-0','spk-1','spk-2','spk-3','spk-4'];
const spkColorMap = {};

// ─── Boot ─────────────────────────────────────────────────────────
async function init() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { location.href = '/login.html'; return; }
  } catch(e) {}

  const stored = localStorage.getItem('currentTranscript');
  if (!stored) { location.href = '/dashboard.html'; return; }
  T = JSON.parse(stored);
  render(T);
}

// ─── Render ───────────────────────────────────────────────────────
function render(t) {
  const text = t.transcript || '';
  const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;

  document.getElementById('fileName').textContent = t.filename || 'Untitled';
  document.getElementById('chipDate').textContent = fmtDate(t.created_at);
  document.getElementById('chipMode').textContent = modeLabel(t.mode);
  document.getElementById('chipLang').textContent = '🌐 ' + (t.language || 'en').toUpperCase();
  document.getElementById('chipWords').textContent = wordCount + ' words';
  document.getElementById('fileBar').style.display = 'flex';

  document.getElementById('insWords').textContent = wordCount.toLocaleString();
  document.getElementById('insChars').textContent = text.length.toLocaleString();
  document.getElementById('insDate').textContent = fmtDate(t.created_at);
  document.getElementById('insLang').textContent = (t.language || 'en').toUpperCase();

  const ei = t.mode==='fast'?'⚡':t.mode==='balanced'?'🐬':'🐋';
  document.getElementById('engineIcon').textContent = ei;
  document.getElementById('engineName').textContent = t.mode==='fast'?'Groq':t.mode==='balanced'?'Deepgram':'AssemblyAI';
  document.getElementById('engineSub').textContent = t.mode==='fast'?'Fastest — Whisper':t.mode==='balanced'?'Best for calls':'Highest accuracy';

  lines = parseLines(text);
  renderLines(lines, null);
  buildSpeakerInsights(lines, wordCount);
  document.getElementById('wordBadge').textContent = wordCount + ' words';
  document.getElementById('insLines').textContent = lines.length.toLocaleString();
  const spks = new Set(lines.map(l=>l.speaker).filter(Boolean));
  document.getElementById('insSpeakers').textContent = spks.size || '—';
  document.title = (t.filename||'Transcript') + ' — Transcribr';

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('contentArea').style.display = 'flex';

  // AUTO-LOAD audio from saved URL — no upload needed
  if (t.audio_url) {
    audio.src = t.audio_url;
    audioLoaded = true;
    document.getElementById('playBtn').disabled = false;
    document.getElementById('nowPlayingLabel').style.display = 'inline';
    document.getElementById('noAudioMsg').style.display = 'none';
    audio.addEventListener('loadedmetadata', () => {
      document.getElementById('durTime').textContent = fmtS(audio.duration);
    }, { once: true });
  } else {
    // File upload — no audio URL stored
    document.getElementById('noAudioMsg').style.display = 'flex';
  }
}

// ─── Parse lines ──────────────────────────────────────────────────
function parseLines(text) {
  if (!text.trim()) return [];
  return text.split('\n').filter(l=>l.trim()).map(line => {
    const tsM = line.match(/^\[(\d{1,2}:\d{2}(?::\d{2})?)\]\s*/);
    const timeStr = tsM ? tsM[1] : null;
    const timeSec = timeStr ? ts2s(timeStr) : null;
    const rest = tsM ? line.slice(tsM[0].length) : line;
    const spkM = rest.match(/^(Speaker [A-Z0-9]+):\s*/i);
    const speaker = spkM ? spkM[1] : null;
    const txt = spkM ? rest.slice(spkM[0].length) : rest;
    return { timeStr, timeSec, speaker, text: txt };
  });
}
function ts2s(ts) { const p=ts.split(':').map(Number); return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1]; }

// ─── Render lines ─────────────────────────────────────────────────
function renderLines(ls, query) {
  const el = document.getElementById('transcriptLines');
  if (!ls.length) { el.innerHTML='<div style="color:var(--muted);padding:1rem">No content.</div>'; return; }

  if (ls.every(l=>l.timeSec===null)) {
    let html = ls.map(l=>renderPII(escH(l.text))).join('\n');
    if (query) html = highlight(html,query);
    el.innerHTML = `<div class="plain-text">${html}</div>`;
    return;
  }

  el.innerHTML = ls.map((l,i) => {
    if (!spkColorMap[l.speaker] && l.speaker) {
      spkColorMap[l.speaker] = SPEAKER_COLORS[Object.keys(spkColorMap).length % SPEAKER_COLORS.length];
    }
    const spkClass = l.speaker ? spkColorMap[l.speaker]||'spk-0' : '';
    let txt = renderPII(escH(l.text));
    if (query) txt = highlight(txt, query);
    return `<div class="t-line" id="ln${i}" onclick="lineClick(${i})">
      <span class="t-ts">${l.timeStr ? fmtS(l.timeSec) : ''}</span>
      <div class="t-body">
        ${l.speaker?`<div class="t-spk ${spkClass}">${escH(l.speaker)}</div>`:''}
        <div class="t-txt">${txt}</div>
      </div>
    </div>`;
  }).join('');
}

// PII — replaces [PII], ***PII***, <PII>, [REDACTED], phone numbers, emails if flagged
function renderPII(html) {
  return html
    .replace(/\[PII\]/gi, '<span class="pii-tag">🔒 PII</span>')
    .replace(/\[REDACTED\]/gi, '<span class="pii-tag">🔒 PII</span>')
    .replace(/&lt;PII&gt;/gi, '<span class="pii-tag">🔒 PII</span>')
    .replace(/\*\*\*PII\*\*\*/gi, '<span class="pii-tag">🔒 PII</span>')
    .replace(/\[PHONE\]/gi, '<span class="pii-tag">🔒 PHONE</span>')
    .replace(/\[EMAIL\]/gi, '<span class="pii-tag">🔒 EMAIL</span>')
    .replace(/\[SSN\]/gi, '<span class="pii-tag">🔒 SSN</span>');
}

function highlight(html, q) {
  return html.replace(new RegExp(escH(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark class="hl">${m}</mark>`);
}

// ─── Speaker insights ─────────────────────────────────────────────
function buildSpeakerInsights(ls, totalWords) {
  const spks = {};
  ls.forEach(l => { if (!l.speaker) return; spks[l.speaker]=(spks[l.speaker]||0)+(l.text.match(/\S+/g)||[]).length; });
  const entries = Object.entries(spks);
  if (!entries.length) return;
  document.getElementById('spkSection').style.display = 'block';
  const colors = ['#34d399','#a78bfa','#fbbf24','#f472b6','#38bdf8'];
  document.getElementById('spkList').innerHTML = entries.map(([name,wc],i) => {
    const pct = totalWords?Math.round(wc/totalWords*100):0;
    const color = colors[i%colors.length];
    return `<div class="spk-row">
      <div class="spk-row-top"><span class="spk-name" style="color:${color}">${escH(name)}</span><span class="spk-pct">${pct}% · ${wc}w</span></div>
      <div class="spk-bar-wrap"><div class="spk-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

// ─── Search ───────────────────────────────────────────────────────
function doSearch(q) {
  renderLines(lines, q.trim()||null);
  if (!q.trim()) { document.getElementById('matchCt').textContent=''; return; }
  const n = lines.reduce((a,l)=>a+(l.text.match(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length,0);
  document.getElementById('matchCt').textContent = n?`${n} match${n>1?'es':''}`:' No matches';
  const first = document.querySelector('mark.hl');
  if (first) first.scrollIntoView({behavior:'smooth',block:'center'});
}

// ─── Audio ────────────────────────────────────────────────────────
function togglePlay() {
  if (!audioLoaded) return;
  audio.paused ? audio.play() : audio.pause();
}
audio.addEventListener('play', ()=>document.getElementById('playBtn').textContent='⏸');
audio.addEventListener('pause', ()=>document.getElementById('playBtn').textContent='▶');
audio.addEventListener('ended', ()=>document.getElementById('playBtn').textContent='▶');

audio.addEventListener('timeupdate', () => {
  const t=audio.currentTime, d=audio.duration||0, pct=d?t/d*100:0;
  document.getElementById('curTime').textContent = fmtS(t);
  document.getElementById('seekFill').style.width = pct+'%';
  document.getElementById('seekThumb').style.left = pct+'%';
  syncActiveLine(t);
});

function seekClick(e) {
  if (!audioLoaded || !audio.duration) return;
  const inner = document.querySelector('.seek-track-inner');
  const r = inner.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
  audio.currentTime = pct * audio.duration;
}

function lineClick(idx) {
  const l = lines[idx];
  if (l.timeSec === null) return;
  if (!audioLoaded) { showToast('No audio available for this transcript'); return; }
  audio.currentTime = l.timeSec;
  if (audio.paused) audio.play();
}

function syncActiveLine(t) {
  let idx = -1;
  for (let i=0; i<lines.length; i++) {
    if (lines[i].timeSec !== null && lines[i].timeSec <= t) idx = i;
  }
  if (idx === activeIdx) return;
  activeIdx = idx;
  document.querySelectorAll('.t-line.active').forEach(e=>e.classList.remove('active'));
  if (idx >= 0) {
    const el = document.getElementById('ln'+idx);
    if (el) {
      el.classList.add('active');
      if (document.getElementById('followTgl').checked) {
        el.scrollIntoView({behavior:'smooth', block:'center'});
      }
    }
  }
}

function setSpeed(s, btn) {
  audio.playbackRate = s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleMute() {
  audio.muted = !audio.muted;
  document.querySelector('.vol-icon').textContent = audio.muted?'🔇':'🔊';
}

// ─── Translation ──────────────────────────────────────────────────
async function startTranslation() {
  const lang = document.getElementById('translateLang').value;
  if (!lang) { showToast('Please select a language first'); return; }

  translateLangName = lang;
  document.getElementById('translateModalTitle').textContent = `Translation — ${lang}`;
  document.getElementById('translateModalBody').innerHTML = `<div class="translate-loading"><div class="translate-spinner"></div><span>Translating to ${lang}…</span></div>`;
  document.getElementById('translateOverlay').classList.add('show');

  try {
    const text = T?.transcript || '';
    // Chunk text if very long (keep under ~3000 chars per request)
    const chunks = chunkText(text, 3000);
    let translated = '';

    for (const chunk of chunks) {
      const res = await fetch('/api/config').then(r=>r.json()).then(cfg => {
        // Use Claude API via our own config-proxy pattern
        return fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            messages: [{
              role: 'user',
              content: `Translate the following transcript to ${lang}. Keep speaker labels (Speaker 1:, Speaker 2:) and timestamps ([0:05]) exactly as they are. Only translate the spoken text. Return only the translated transcript, nothing else.\n\n${chunk}`
            }]
          })
        });
      });

      // If direct Anthropic API isn't available, use a simple prompt via our /api/translate endpoint
      if (!res.ok) throw new Error('Translation API not available');
      const data = await res.json();
      translated += (data.content?.[0]?.text || '') + '\n';
    }

    translatedText = translated.trim();
    document.getElementById('translateModalBody').innerHTML = `<div class="translate-content">${escH(translatedText)}</div>`;
  } catch(e) {
    // Fallback: show message that translation requires API setup
    document.getElementById('translateModalBody').innerHTML = `
      <div style="color:var(--muted);text-align:center;padding:2rem">
        <div style="font-size:2rem;margin-bottom:1rem">🌐</div>
        <div style="font-size:0.9rem;margin-bottom:0.5rem">Translation requires a Claude API endpoint.</div>
        <div style="font-size:0.8rem">Add a <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">/api/translate</code> route to your server.js to enable this feature.</div>
      </div>`;
  }
}

function chunkText(text, maxLen) {
  const lines = text.split('\n');
  const chunks = [], cur = [];
  let len = 0;
  for (const line of lines) {
    if (len + line.length > maxLen && cur.length) {
      chunks.push(cur.join('\n'));
      cur.length = 0; len = 0;
    }
    cur.push(line); len += line.length;
  }
  if (cur.length) chunks.push(cur.join('\n'));
  return chunks;
}

function closeTranslation() { document.getElementById('translateOverlay').classList.remove('show'); }
function copyTranslation() { navigator.clipboard.writeText(translatedText).then(()=>showToast('✅ Copied!')); }
function downloadTranslation() {
  const name = (T?.filename||'transcript').replace(/\.[^.]+$/,'') + `_${translateLangName}.txt`;
  dl(translatedText, name, 'text/plain');
}

// ─── Export ───────────────────────────────────────────────────────
function copyText(){navigator.clipboard.writeText(T?.transcript||'').then(()=>showToast('✅ Copied!'));}
function downloadTxt(){dl(T?.transcript||'',base()+'.txt','text/plain');showToast('⬇ TXT saved');}
function downloadSrt(){dl(makeSrt(),base()+'.srt','text/plain');showToast('⬇ SRT saved');}
function downloadVtt(){dl('WEBVTT\n\n'+makeSrt().replace(/,/g,'.'),base()+'.vtt','text/vtt');showToast('⬇ VTT saved');}
function makeSrt(){const tl=lines.filter(l=>l.timeSec!==null);return tl.map((l,i)=>`${i+1}\n${s2srt(l.timeSec)} --> ${s2srt(tl[i+1]?.timeSec??l.timeSec+5)}\n${l.speaker?l.speaker+': ':''}${l.text}\n`).join('\n');}
function s2srt(s){s=s||0;const h=~~(s/3600),m=~~((s%3600)/60),sec=~~(s%60),ms=Math.round((s%1)*1000);return`${p2(h)}:${p2(m)}:${p2(sec)},${String(ms).padStart(3,'0')}`;}
function base(){return(T?.filename||'transcript').replace(/\.[^.]+$/,'');}
function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}

async function deleteTranscript() {
  if (!confirm('Delete this transcript permanently?')) return;
  if (sb) await sb.from('transcriptions').delete().eq('id', T.id);
  localStorage.removeItem('currentTranscript');
  showToast('🗑 Deleted');
  setTimeout(()=>location.href='/dashboard.html', 900);
}

function fmtS(s){if(!s&&s!==0)return'0:00';s=Math.floor(s);return`${~~(s/60)}:${p2(s%60)}`;}
function p2(n){return String(n).padStart(2,'0');}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function modeLabel(m){return m==='fast'?'⚡ Fast':m==='balanced'?'🐬 Balanced':'🐋 Most Accurate';}
function fmtDate(d){return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

init();
</script>
</body>
</html>
