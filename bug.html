<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Report a Bug — Transcribr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0f0f8; --muted: #888899; --accent: #7c6aff; --accent2: #a78bfa; --red: #f87171; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.92); backdrop-filter: blur(16px); }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent2); }
.page { max-width: 560px; margin: 5rem auto; padding: 0 2rem 4rem; }
.page h1 { font-size: 2rem; margin-bottom: 0.4rem; }
.page .sub { color: var(--muted); margin-bottom: 2.5rem; font-size: 0.92rem; line-height: 1.6; }
label { display: block; color: var(--muted); font-size: 0.82rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; margin-top: 1.3rem; }
input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 10px; padding: 0.72rem 1rem; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 120px; }
.severity { display: flex; gap: 0.5rem; margin-top: 0.4rem; flex-wrap: wrap; }
.sev-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
.sev-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(124,106,255,0.1); }
.btn { margin-top: 1.6rem; width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 100px; font-size: 0.92rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s; }
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.success { display: none; text-align: center; padding: 2rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 14px; margin-top: 2rem; }
.success .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
.success h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }
.success p { color: var(--muted); font-size: 0.88rem; }
footer { border-top: 1px solid var(--border); padding: 2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; color: var(--muted); font-size: 0.83rem; }
footer a { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Transcribr<span>.</span></a>
  <a href="/dashboard.html" style="color:var(--muted);font-size:0.88rem;text-decoration:none;">← Dashboard</a>
</nav>
<div class="page">
  <h1>Report a Bug 🐛</h1>
  <p class="sub">Found something broken? Let us know and we'll fix it fast. Please be as specific as possible.</p>

  <div id="formWrap">
    <label>Severity</label>
    <div class="severity" id="sevGroup">
      <button class="sev-btn" data-v="low" onclick="setSev(this)">Low — minor issue</button>
      <button class="sev-btn active" data-v="medium" onclick="setSev(this)">Medium — affects workflow</button>
      <button class="sev-btn" data-v="high" onclick="setSev(this)">High — blocking</button>
    </div>

    <label>Where did the bug occur?</label>
    <select id="location">
      <option value="dashboard">Dashboard</option>
      <option value="transcription">During transcription</option>
      <option value="transcript_page">Transcript page / player</option>
      <option value="login">Login / sign up</option>
      <option value="homepage">Homepage</option>
      <option value="other">Other</option>
    </select>

    <label>Describe the bug</label>
    <textarea id="desc" placeholder="What happened? What did you expect to happen?"></textarea>

    <label>Steps to reproduce (optional)</label>
    <textarea id="steps" placeholder="1. Upload file…&#10;2. Click…&#10;3. Error appeared…" style="min-height:90px;"></textarea>

    <label>Your email (optional — for follow-up)</label>
    <input type="email" id="email" placeholder="you@example.com"/>

    <button class="btn" id="submitBtn" onclick="submitBug()">Submit Bug Report →</button>
  </div>

  <div class="success" id="successBox">
    <div class="icon">✅</div>
    <h3>Bug reported!</h3>
    <p>Thanks for helping us improve. We'll investigate and fix this as soon as possible.</p>
  </div>
</div>

<footer>
  <span>© 2025 Transcribr</span>
  <div style="display:flex;gap:1.5rem">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="/contact.html">Contact</a>
  </div>
</footer>

<script>
let severity = 'medium';
function setSev(btn) {
  severity = btn.dataset.v;
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function submitBug() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { alert('Please describe the bug.'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  setTimeout(() => {
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  }, 800);
}
</script>
</body>
</html>
